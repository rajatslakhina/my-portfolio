<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="hsl(240 10% 3.9%)"/> 
  
  <g transform="translate(40, 40)" fill="hsl(0 0% 98%)">
    <rect width="180" height="8" rx="2" opacity="0.6">
        <animate attributeName="opacity" values="0.6; 1; 0.6" dur="4s" repeatCount="indefinite" />
    </rect>
    <rect y="20" width="250" height="8" rx="2" opacity="0.8">
        <animate attributeName="opacity" values="0.8; 0.5; 0.8" dur="4s" begin="1s" repeatCount="indefinite" />
    </rect>
    <rect y="40" width="100" height="8" rx="2" opacity="0.4">
        <animate attributeName="opacity" values="0.4; 0.9; 0.4" dur="4s" begin="2s" repeatCount="indefinite" />
    </rect>
    
    <rect y="80" width="150" height="8" rx="2" opacity="0.7">
        <animate attributeName="opacity" values="0.7; 0.6; 0.7" dur="4s" begin="0.5s" repeatCount="indefinite" />
    </rect>
    <rect y="100" width="220" height="8" rx="2" opacity="0.9">
        <animate attributeName="opacity" values="0.9; 0.7; 0.9" dur="4s" begin="1.5s" repeatCount="indefinite" />
    </rect>
    <rect y="120" width="130" height="8" rx="2" opacity="0.5">
        <animate attributeName="opacity" values="0.5; 0.8; 0.5" dur="4s" begin="2.5s" repeatCount="indefinite" />
    </rect>
  </g>
  
  <circle cx="350" cy="200" r="20" fill="hsl(217 91% 60% / 0.5)">
    <animate attributeName="r" values="20; 25; 20" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.5; 0.8; 0.5" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>